name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Tests and quality checks
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      AI_PROVIDER: mock

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Prepare environment
        run: cp .env.example .env

      - name: Run tests
        run: python -m pytest

      - name: Compile Python files
        run: python -m compileall app.py pages src scripts

      - name: Run smoke check
        run: python scripts/smoke_check.py

      - name: Evaluate extraction quality
        run: python scripts/evaluate_extraction.py

      - name: Check diff whitespace
        run: git diff --check

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t invoice-manager:test .
